name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t azylla-dev:latest -f deploy/Dockerfile .

      - name: Deploy to Swarm
        run: docker stack deploy -c deploy/docker-compose.yml azylla-dev
